<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOTU FlowWall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wall-app">
    <header class="topbar">
      <div class="topbar-actions">
        <div id="modePills" class="mode-pills" aria-label="Catalog modes"></div>
        <button id="previousButton" class="control-button" type="button">Prev</button>
        <button id="nextButton" class="control-button" type="button">Next</button>
        <button id="demoButton" class="control-button" type="button">Demo</button>
        <button id="fanButton" class="control-button" type="button">Fan</button>
        <button id="expandItemButton" class="control-button" type="button">Expand</button>
        <button id="resetButton" class="control-button" type="button">Return</button>
        <button id="fullscreenButton" class="control-button" type="button">Full</button>
      </div>
    </header>

    <section class="main-grid">
      <section class="stage-panel">
        <div id="stage" class="stage" aria-live="polite">
          <div id="stackLayer" class="stack-layer"></div>
          <div id="gestureHint" class="gesture-hint">Tap a catalog on the left to begin.</div>
        </div>

        <div class="panel-head stage-banner">
          <div class="stage-headline">
            <p class="eyebrow">Active Stage</p>
            <h3 id="stageTitle">Select a catalog</h3>
          </div>
          <div id="catalogCount" class="panel-pill"></div>
        </div>
      </section>

      <aside class="dock-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Wall Dock</p>
            <h3>Catalog Rail</h3>
          </div>
        </div>
        <div id="dock" class="dock-list"></div>
      </aside>
    </section>
  </main>

  <section id="zoomOverlay" class="zoom-overlay" hidden>
    <div class="zoom-backdrop"></div>
    <div class="zoom-panel" role="dialog" aria-modal="true" aria-labelledby="zoomTitle">
      <div class="zoom-header">
        <div>
          <p class="eyebrow">Expanded View</p>
          <h3 id="zoomTitle">Active item</h3>
        </div>
        <div class="zoom-actions">
          <button id="zoomPreviousButton" class="control-button" type="button">Prev</button>
          <button id="zoomHomeButton" class="control-button" type="button">Home</button>
          <button id="zoomNextButton" class="control-button" type="button">Next</button>
          <button id="zoomOutButton" class="control-button" type="button">Zoom Out</button>
          <button id="zoomInButton" class="control-button" type="button">Zoom In</button>
          <button id="zoomCloseButton" class="control-button" type="button">Close</button>
        </div>
      </div>
      <div class="zoom-canvas">
        <img id="zoomImage" class="zoom-image" alt="" />
      </div>
    </div>
  </section>

  <script src="./script.js"></script>
</body>
</html>
